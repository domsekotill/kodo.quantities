minimum_pre_commit_version: 3.2.0
default_install_hook_types: [pre-commit, pre-push, commit-msg]
default_language_version: {python: "3.11"}
default_stages: [pre-commit]

repos:

- repo: meta
  hooks:
  - id: check-hooks-apply
  - id: check-useless-excludes

- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-added-large-files
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-toml
  - id: check-yaml
  - id: debug-statements
  - id: destroyed-symlinks
  - id: end-of-file-fixer
    stages: [pre-commit, manual]
  - id: fix-byte-order-marker
  - id: mixed-line-ending
    args: [--fix=lf]
    stages: [pre-commit, manual]
  - id: trailing-whitespace
    exclude_types: [markdown, plain-text]
    stages: [pre-commit, manual]

- repo: https://github.com/jorisroovers/gitlint
  rev: v0.19.1
  hooks:
  - id: gitlint

- repo: https://code.kodo.org.uk/dom/pre-commit-hooks
  rev: v0.6.3
  hooks:
  - id: check-executable-modes
  - id: check-for-squash
  - id: copyright-notice
    args: [--min-size=1000]
    files: ^kodo/.*
    stages: [pre-commit, manual]
  - id: protect-first-parent

- repo: https://github.com/pre-commit/pygrep-hooks
  rev: v1.10.0
  hooks:
  - id: python-no-eval
  - id: python-no-log-warn
  - id: python-use-type-annotations

- repo: https://github.com/asottile/pyupgrade
  rev: v3.21.2
  hooks:
  - id: pyupgrade

- repo: https://github.com/hakancelikdev/unimport
  rev: 1.3.1
  hooks:
  - id: unimport
    args: [--remove]
    types: []
    types_or: [python, pyi]
    additional_dependencies: [libcst >=0.4.0]
    stages: [pre-commit, manual]

- repo: https://github.com/pycqa/isort
  rev: 8.0.1
  hooks:
  - id: isort
    stages: [pre-commit, manual]

- repo: https://code.kodo.org.uk/dom/pre-commit-pytest
  rev: v1.0
  hooks:
  - id: pytest
    types_or: [python, markdown]
    stages: [pre-commit, manual]
    args: [--doctest-modules, --doctest-continue-on-failure]
  - id: pytest
    args: [test.py]

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.15.10
  hooks:
  - id: ruff
    args: [--fix, --unsafe-fixes]

- repo: https://github.com/pre-commit/mirrors-mypy
  rev: v1.20.1
  hooks:
  - id: mypy
    args: [--follow-imports=silent, kodo]
    pass_filenames: false
